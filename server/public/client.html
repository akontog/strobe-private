<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Canvas Demo</title>
  <link rel="stylesheet" type="text/css" href="css/styles.css">
  <script src="/socket.io/socket.io.js"></script>
</head>
<body>
        <div class="container">
        <div class="header panel">
            <h1>👨‍🏫 Teacher Client - Γεωμετρικός Σχεδιαστής</h1>
            
            <!-- Compact Controls Row -->
            <div class="compact-controls">
                <div class="control-group">
                    <label>Σχήμα:</label>
                    <select id="shapeSelect" class="compact-select">
                        <option value="point">📍 Σημείο</option>
                        <option value="line">📏 Ευθύγραμμο Τμήμα</option>
                        <option value="ray">➡️ Ημιευθεία</option>
                        <option value="circle">⭕ Κύκλος</option>
                        <option value="triangle">🔺 Τρίγωνο</option>
                        <option value="rectangle">⬜ Ορθογώνιο</option>
                        <option value="polygon">⬡ Πολύγωνο</option>
                    </select>
                </div>

                <div class="control-group">
                    <label>Μέτρηση:</label>
                    <select id="measureSelect" class="compact-select">
                        <option value="">Χωρίς μέτρηση</option>
                        <option value="measure-distance">📐 Απόσταση</option>
                        <option value="measure-angle">📐 Γωνία</option>
                    </select>
                </div>

                <div class="control-group">
                    <label>Χρώμα:</label>
                    <input type="color" id="colorPicker" value="#000000" class="compact-color">
                </div>

                <div class="control-group">
                    <label>Πάχος:</label>
                    <input type="number" id="lineWidth" value="2" min="1" max="10" class="compact-input">
                </div>

                <div class="control-group">
                    <label>Grid:</label>
                    <input type="number" id="gridSize" value="50" min="10" max="100" class="compact-input">
                    <input type="checkbox" id="showGrid" checked title="Εμφάνιση">
                    <input type="checkbox" id="snapToGrid" title="Snap">
                </div>

                <div class="control-group">
                    <button class="btn-compact btn-danger" id="clearBtn">🗑️</button>
                    <button class="btn-compact btn-primary" id="undoBtn">↶</button>
                    <button class="btn-compact btn-success" id="broadcastBtn">📡</button>
                    <button class="btn-compact btn-primary" id="saveBtn">💾</button>
                    <button class="btn-compact btn-primary" id="loadBtn">📂</button>
                    <button class="btn-compact btn-primary" id="exportJsonBtn" title="Εξαγωγή JSON">⬇️</button>
                    <button class="btn-compact btn-primary" id="importJsonBtn" title="Εισαγωγή JSON">⬆️</button>
                    <input type="file" id="activityJsonInput" accept=".json,application/json" hidden>
                </div>
            </div>

            <!-- Stats & Students Row -->
            <div class="stats-row">
                <div class="stat-group">
                    <span>Κατάσταση: <span class="stat-value" id="connectionStatus">❌ Offline</span></span>
                    <span>Συνδεδεμένοι: <span class="stat-value" id="connectedCount">0</span></span>
                    <span>Κάμερες: <span class="stat-value" id="cameraCount">0</span></span>
                    <span>Ποντίκια: <span class="stat-value" id="mouseCount">0</span></span>
                </div>
                <div class="stat-group">
                    <button class="btn-compact btn-success" id="startActivityBtn">▶️ Έναρξη</button>
                    <button class="btn-compact btn-danger" id="stopActivityBtn">⏸️ Παύση</button>
                    <span>Χρόνος: <span class="stat-value" id="activityTimer">00:00</span></span>
                </div>
                <div class="stat-group students-inline">
                    <label>👥 Μαθητές:</label>
                    <div class="student-list-inline" id="studentList">
                        <span style="opacity: 0.7;">Κανένας</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Canvas Panel (full width) -->
        <div class="panel canvas-panel-full">
            <div class="canvas-container">
                <canvas id="canvas" width="1200" height="700"></canvas>
            </div>
            <div class="measurements-inline">
                <strong>📊 Μετρήσεις:</strong>
                <span id="measurementsDisplay" style="opacity: 0.7; font-style: italic;">Επιλέξτε στοιχεία</span>
            </div>
        </div>
    </div>

    <script>
        // === Configuration ===
        const SERVER_URL = 'http://localhost:3000';
        let socket = null;
        let isConnected = false;

        // Canvas
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const CANVAS_WIDTH = canvas.width;
        const CANVAS_HEIGHT = canvas.height;

        // State
        let currentTool = 'point';
        let currentColor = '#000000';
        let lineWidth = 2;
        let showGrid = true;
        let snapToGrid = false;
        let gridSize = 50;

        // Geometry storage
        let geometryObjects = [];
        let studentPoints = new Map();  // userId -> {x, y, color, name}
        let tempPoints = [];  // For multi-point shapes (triangle, polygon)
        let isDrawing = false;
        let startPoint = null;

        // Activity
        let activityStartTime = null;
        let activityTimer = null;

        // Letter labels for points
        let pointLabel = 0;
        const POINT_LABELS = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';

        function getPointLabelIndex(label) {
            if (typeof label !== 'string' || !label.trim()) {
                return -1;
            }

            return POINT_LABELS.indexOf(label.trim().charAt(0).toUpperCase());
        }

        function recalculatePointLabel() {
            const pointCount = geometryObjects.filter((obj) => obj && obj.type === 'point').length;
            const highestLabelIndex = geometryObjects.reduce((maxIdx, obj) => {
                if (!obj || obj.type !== 'point') {
                    return maxIdx;
                }

                const idx = getPointLabelIndex(obj.label);
                return idx >= 0 ? Math.max(maxIdx, idx + 1) : maxIdx;
            }, 0);

            pointLabel = Math.max(pointCount, highestLabelIndex, 0);
        }

        function refreshCanvasView() {
            updateGeometryList();
            render();
        }

        function syncGeometryState() {
            refreshCanvasView();
            broadcastEnvironment();
        }

        function applyLoadedGeometry(nextGeometry) {
            geometryObjects = Array.isArray(nextGeometry) ? nextGeometry : [];
            tempPoints = [];
            recalculatePointLabel();
            refreshCanvasView();
        }

        function normalizeActivityPayload(payload) {
            if (Array.isArray(payload)) {
                return {
                    name: 'Imported Activity',
                    geometry: payload
                };
            }

            if (payload && Array.isArray(payload.geometry)) {
                return {
                    name: typeof payload.name === 'string' && payload.name.trim() ? payload.name.trim() : 'Imported Activity',
                    geometry: payload.geometry
                };
            }

            return null;
        }

        function sanitizeJsonFilename(baseName) {
            const safe = String(baseName || 'activity')
                .trim()
                .replace(/[^a-z0-9_-]/gi, '_')
                .replace(/_+/g, '_')
                .replace(/^_+|_+$/g, '');

            return `${safe || 'activity'}.json`;
        }

        function buildJsonActivityPayload(name) {
            return {
                name: name || `Activity_${new Date().toISOString().split('T')[0]}`,
                geometry: geometryObjects,
                createdAt: new Date().toISOString(),
                meta: {
                    app: 'geometry-live',
                    format: 'strobe-geometry-activity-v1',
                    canvas: {
                        width: CANVAS_WIDTH,
                        height: CANVAS_HEIGHT
                    }
                }
            };
        }

        // === Socket.io Connection ===
        function connectToServer() {
            socket = io(SERVER_URL);

            socket.on('connect', () => {
                isConnected = true;
                updateConnectionStatus(true);
                console.log('✅ Connected to server');
            });

            socket.on('activity-loaded', (activity) => {
                if (activity && Array.isArray(activity.geometry)) {
                    applyLoadedGeometry(activity.geometry);
                }
            });

            socket.on('users-update', (users) => {
                updateFromUsers(users);
            });

            socket.on('disconnect', () => {
                isConnected = false;
                updateConnectionStatus(false);
            });
        }

        // === Tool Selection ===
        document.getElementById('shapeSelect').addEventListener('change', (e) => {
            currentTool = e.target.value;
            tempPoints = [];
            // Clear measure if shape selected
            document.getElementById('measureSelect').value = '';
            console.log('Tool selected:', currentTool);
        });

        document.getElementById('measureSelect').addEventListener('change', (e) => {
            if (e.target.value) {
                currentTool = e.target.value;
                tempPoints = [];
                console.log('Measure tool selected:', currentTool);
            }
        });

        // === Color Selection ===
        document.getElementById('colorPicker').addEventListener('change', (e) => {
            currentColor = e.target.value;
        });

        // === Settings ===
        document.getElementById('lineWidth').addEventListener('change', (e) => {
            lineWidth = parseInt(e.target.value);
        });

        document.getElementById('showGrid').addEventListener('change', (e) => {
            showGrid = e.target.checked;
            render();
        });

        document.getElementById('snapToGrid').addEventListener('change', (e) => {
            snapToGrid = e.target.checked;
        });

        document.getElementById('gridSize').addEventListener('change', (e) => {
            gridSize = parseInt(e.target.value);
            render();
        });

        // === Canvas Mouse Events ===
        canvas.addEventListener('mousedown', (e) => {
            const rect = canvas.getBoundingClientRect();
            let x = e.clientX - rect.left;
            let y = e.clientY - rect.top;

            if (snapToGrid) {
                x = Math.round(x / gridSize) * gridSize;
                y = Math.round(y / gridSize) * gridSize;
            }

            handleMouseDown(x, y);
        });

        canvas.addEventListener('mousemove', (e) => {
            if (!isDrawing) return;
            
            const rect = canvas.getBoundingClientRect();
            let x = e.clientX - rect.left;
            let y = e.clientY - rect.top;

            if (snapToGrid) {
                x = Math.round(x / gridSize) * gridSize;
                y = Math.round(y / gridSize) * gridSize;
            }

            handleMouseMove(x, y);
        });

        canvas.addEventListener('mouseup', (e) => {
            const rect = canvas.getBoundingClientRect();
            let x = e.clientX - rect.left;
            let y = e.clientY - rect.top;

            if (snapToGrid) {
                x = Math.round(x / gridSize) * gridSize;
                y = Math.round(y / gridSize) * gridSize;
            }

            handleMouseUp(x, y);
        });

        // === Drawing Logic ===
        function handleMouseDown(x, y) {
            isDrawing = true;
            startPoint = {x, y};

            if (currentTool === 'point') {
                addGeometry({
                    type: 'point',
                    x, y,
                    color: currentColor,
                    label: POINT_LABELS[pointLabel % 26]
                });
                pointLabel++;
                isDrawing = false;
                syncGeometryState();
            } else if (['triangle', 'polygon'].includes(currentTool)) {
                tempPoints.push({x, y});
                render();
            }
        }

        function handleMouseMove(x, y) {
            if (!isDrawing || !startPoint) return;

            // Preview for line, circle, rectangle
            render();
            
            ctx.strokeStyle = currentColor;
            ctx.lineWidth = lineWidth;
            ctx.setLineDash([5, 5]);

            if (currentTool === 'line' || currentTool === 'ray') {
                ctx.beginPath();
                ctx.moveTo(startPoint.x, startPoint.y);
                ctx.lineTo(x, y);
                ctx.stroke();
            } else if (currentTool === 'circle') {
                const radius = Math.sqrt(Math.pow(x - startPoint.x, 2) + Math.pow(y - startPoint.y, 2));
                ctx.beginPath();
                ctx.arc(startPoint.x, startPoint.y, radius, 0, Math.PI * 2);
                ctx.stroke();
            } else if (currentTool === 'rectangle') {
                ctx.beginPath();
                ctx.rect(startPoint.x, startPoint.y, x - startPoint.x, y - startPoint.y);
                ctx.stroke();
            }

            ctx.setLineDash([]);
        }

        function handleMouseUp(x, y) {
            if (!isDrawing) return;
            isDrawing = false;
            let geometryChanged = false;

            if (currentTool === 'line') {
                addGeometry({
                    type: 'line',
                    x1: startPoint.x, y1: startPoint.y,
                    x2: x, y2: y,
                    color: currentColor,
                    width: lineWidth
                });
                geometryChanged = true;
            } else if (currentTool === 'ray') {
                addGeometry({
                    type: 'ray',
                    x1: startPoint.x, y1: startPoint.y,
                    x2: x, y2: y,
                    color: currentColor,
                    width: lineWidth
                });
                geometryChanged = true;
            } else if (currentTool === 'circle') {
                const radius = Math.sqrt(Math.pow(x - startPoint.x, 2) + Math.pow(y - startPoint.y, 2));
                addGeometry({
                    type: 'circle',
                    x: startPoint.x, y: startPoint.y,
                    radius,
                    color: currentColor,
                    width: lineWidth
                });
                geometryChanged = true;
            } else if (currentTool === 'rectangle') {
                addGeometry({
                    type: 'rectangle',
                    x: startPoint.x, y: startPoint.y,
                    width: x - startPoint.x,
                    height: y - startPoint.y,
                    color: currentColor,
                    lineWidth
                });
                geometryChanged = true;
            } else if (currentTool === 'triangle' && tempPoints.length === 3) {
                addGeometry({
                    type: 'triangle',
                    points: [...tempPoints],
                    color: currentColor,
                    width: lineWidth
                });
                tempPoints = [];
                geometryChanged = true;
            }

            if (geometryChanged) {
                syncGeometryState();
            } else {
                render();
            }
        }

        // === Geometry Management ===
        function addGeometry(obj) {
            obj.id = 'geo_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
            geometryObjects.push(obj);
        }

        function deleteGeometry(id) {
            geometryObjects = geometryObjects.filter(obj => obj.id !== id);
            syncGeometryState();
        }

        function updateGeometryList() {
            const list = document.getElementById('geometryList');

            // The compact teacher UI does not render a geometry side list.
            if (!list) {
                return;
            }
            
            if (geometryObjects.length === 0) {
                list.innerHTML = '<p style="opacity: 0.7; text-align: center;">Κανένα σχήμα</p>';
                return;
            }

            list.innerHTML = geometryObjects.map(obj => {
                let label = '';
                if (obj.type === 'point') label = `Σημείο ${obj.label}`;
                else if (obj.type === 'line') label = 'Ευθύγραμμο Τμήμα';
                else if (obj.type === 'circle') label = `Κύκλος (r=${Math.round(obj.radius)})`;
                else if (obj.type === 'triangle') label = 'Τρίγωνο';
                else label = obj.type;

                return `
                    <div class="geometry-item">
                        <span>${label}</span>
                        <button class="delete-btn" onclick="deleteGeometry('${obj.id}')">🗑️</button>
                    </div>
                `;
            }).join('');
        }

        // === Rendering ===
        function render() {
            // Clear
            ctx.fillStyle = '#f8f9fa';
            ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);

            // Grid
            if (showGrid) {
                ctx.strokeStyle = '#e0e0e0';
                ctx.lineWidth = 1;
                for (let i = 0; i <= CANVAS_WIDTH; i += gridSize) {
                    ctx.beginPath();
                    ctx.moveTo(i, 0);
                    ctx.lineTo(i, CANVAS_HEIGHT);
                    ctx.stroke();
                }
            }

            // Draw geometry objects
            geometryObjects.forEach(obj => drawGeometry(obj));

            // Draw temp points (for polygon/triangle)
            tempPoints.forEach((p, i) => {
                ctx.fillStyle = currentColor;
                ctx.beginPath();
                ctx.arc(p.x, p.y, 5, 0, Math.PI * 2);
                ctx.fill();
                
                if (i > 0) {
                    ctx.strokeStyle = currentColor;
                    ctx.lineWidth = 2;
                    ctx.setLineDash([5, 5]);
                    ctx.beginPath();
                    ctx.moveTo(tempPoints[i-1].x, tempPoints[i-1].y);
                    ctx.lineTo(p.x, p.y);
                    ctx.stroke();
                    ctx.setLineDash([]);
                }
            });

            // Draw student points
            studentPoints.forEach((point) => {
                drawUserMarker(point);
            });
        }

        function drawGeometry(obj) {
            ctx.strokeStyle = obj.color;
            ctx.fillStyle = obj.color;
            ctx.lineWidth = obj.width || obj.lineWidth || 2;

            if (obj.type === 'point') {
                ctx.beginPath();
                ctx.arc(obj.x, obj.y, 6, 0, Math.PI * 2);
                ctx.fill();
                ctx.strokeStyle = 'white';
                ctx.lineWidth = 2;
                ctx.stroke();
                
                // Label
                ctx.fillStyle = '#000';
                ctx.font = 'bold 16px sans-serif';
                ctx.fillText(obj.label, obj.x + 10, obj.y - 10);
            }
            else if (obj.type === 'line') {
                ctx.beginPath();
                ctx.moveTo(obj.x1, obj.y1);
                ctx.lineTo(obj.x2, obj.y2);
                ctx.stroke();
            }
            else if (obj.type === 'ray') {
                const dx = obj.x2 - obj.x1;
                const dy = obj.y2 - obj.y1;
                const len = Math.sqrt(dx*dx + dy*dy);
                const extendX = obj.x1 + (dx/len) * CANVAS_WIDTH;
                const extendY = obj.y1 + (dy/len) * CANVAS_HEIGHT;
                
                ctx.beginPath();
                ctx.moveTo(obj.x1, obj.y1);
                ctx.lineTo(extendX, extendY);
                ctx.stroke();
            }
            else if (obj.type === 'circle') {
                ctx.beginPath();
                ctx.arc(obj.x, obj.y, obj.radius, 0, Math.PI * 2);
                ctx.stroke();
            }
            else if (obj.type === 'rectangle') {
                ctx.beginPath();
                ctx.rect(obj.x, obj.y, obj.width, obj.height);
                ctx.stroke();
            }
            else if (obj.type === 'triangle') {
                ctx.beginPath();
                ctx.moveTo(obj.points[0].x, obj.points[0].y);
                ctx.lineTo(obj.points[1].x, obj.points[1].y);
                ctx.lineTo(obj.points[2].x, obj.points[2].y);
                ctx.closePath();
                ctx.stroke();
            }
        }

        function drawUserMarker(point) {
            const x = point.x * CANVAS_WIDTH;
            const y = point.y * CANVAS_HEIGHT;
            const color = point.color || '#FF6B6B';
            const shape = point.shape || 'circle';
            const label = point.name || 'Χρήστης';
            const size = 10;

            ctx.shadowBlur = 12;
            ctx.shadowColor = color;

            ctx.fillStyle = color;
            drawMarkerShape(x, y, size, shape);

            ctx.shadowBlur = 0;
            ctx.fillStyle = 'white';
            ctx.beginPath();
            ctx.arc(x, y, 4, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = color;
            ctx.font = 'bold 12px sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText(label, x, y - 16);
        }

        function drawMarkerShape(x, y, size, shape) {
            ctx.beginPath();

            if (shape === 'square') {
                ctx.rect(x - size, y - size, size * 2, size * 2);
            } else if (shape === 'triangle') {
                ctx.moveTo(x, y - size - 2);
                ctx.lineTo(x - size - 2, y + size + 2);
                ctx.lineTo(x + size + 2, y + size + 2);
                ctx.closePath();
            } else if (shape === 'diamond') {
                ctx.moveTo(x, y - size - 2);
                ctx.lineTo(x - size - 2, y);
                ctx.lineTo(x, y + size + 2);
                ctx.lineTo(x + size + 2, y);
                ctx.closePath();
            } else {
                ctx.arc(x, y, size, 0, Math.PI * 2);
            }

            ctx.fill();
        }

        // === Broadcast Environment ===
        function broadcastEnvironment() {
            if (!isConnected) return;

            socket.emit('activity-update', geometryObjects);

            console.log('📡 Environment broadcast to all clients');
        }

        // === Controls ===
        document.getElementById('clearBtn').addEventListener('click', () => {
            if (confirm('Διαγραφή όλων των σχημάτων;')) {
                geometryObjects = [];
                tempPoints = [];
                pointLabel = 0;
                syncGeometryState();
            }
        });

        document.getElementById('undoBtn').addEventListener('click', () => {
            if (geometryObjects.length > 0) {
                geometryObjects.pop();
                recalculatePointLabel();
                syncGeometryState();
            }
        });

        document.getElementById('broadcastBtn').addEventListener('click', () => {
            broadcastEnvironment();
            alert('Περιβάλλον στάλθηκε σε όλους τους μαθητές!');
        });

        document.getElementById('saveBtn').addEventListener('click', async () => {
            const name = prompt('Όνομα δραστηριότητας:', 'Activity_' + new Date().toISOString().split('T')[0]);
            if (!name) return;
            
            try {
                const response = await fetch('/api/activity/save', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        name,
                        geometry: geometryObjects
                    })
                });
                const result = await response.json();
                alert('✅ Η δραστηριότητα αποθηκεύτηκε!');
                console.log('Saved:', result);
            } catch (error) {
                alert('❌ Σφάλμα αποθήκευσης');
                console.error(error);
            }
        });

        document.getElementById('exportJsonBtn').addEventListener('click', () => {
            const defaultName = `Activity_${new Date().toISOString().slice(0, 10)}`;
            const name = prompt('Όνομα δραστηριότητας για εξαγωγή JSON:', defaultName);

            if (name === null) {
                return;
            }

            const payload = buildJsonActivityPayload(name.trim() || defaultName);
            const json = JSON.stringify(payload, null, 2);
            const blob = new Blob([json], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');

            link.href = url;
            link.download = sanitizeJsonFilename(payload.name);
            document.body.appendChild(link);
            link.click();
            link.remove();
            URL.revokeObjectURL(url);
        });

        document.getElementById('importJsonBtn').addEventListener('click', () => {
            const fileInput = document.getElementById('activityJsonInput');

            if (fileInput) {
                fileInput.click();
            }
        });

        document.getElementById('activityJsonInput').addEventListener('change', async (event) => {
            const [file] = event.target.files || [];
            event.target.value = '';

            if (!file) {
                return;
            }

            try {
                const text = await file.text();
                const parsed = JSON.parse(text);
                const normalized = normalizeActivityPayload(parsed);

                if (!normalized) {
                    alert('❌ Το JSON δεν έχει έγκυρη μορφή δραστηριότητας.');
                    return;
                }

                applyLoadedGeometry(normalized.geometry);
                broadcastEnvironment();
                alert(`✅ Φορτώθηκε JSON: ${normalized.name}`);
            } catch (error) {
                alert('❌ Σφάλμα ανάγνωσης JSON αρχείου');
                console.error(error);
            }
        });

        document.getElementById('loadBtn').addEventListener('click', async () => {
            try {
                const response = await fetch('/api/activity/list');
                const activities = await response.json();
                
                if (activities.length === 0) {
                    alert('Δεν υπάρχουν αποθηκευμένες δραστηριότητες');
                    return;
                }
                
                let list = 'Επιλέξτε δραστηριότητα:\n\n';
                activities.forEach((act, idx) => {
                    list += `${idx + 1}. ${act.name} (${new Date(act.createdAt).toLocaleString('el-GR')})\n`;
                });
                
                const choice = prompt(list + '\nΑριθμός:');
                if (!choice) return;
                
                const idx = parseInt(choice) - 1;
                if (idx >= 0 && idx < activities.length) {
                    const loadResponse = await fetch(`/api/activity/load/${activities[idx].filename}`);
                    const activity = await loadResponse.json();
                    applyLoadedGeometry(activity.geometry);
                    broadcastEnvironment();
                    alert('✅ Φορτώθηκε: ' + activity.name);
                }
            } catch (error) {
                alert('❌ Σφάλμα φόρτωσης');
                console.error(error);
            }
        });

        // === Activity Controls ===
        document.getElementById('startActivityBtn').addEventListener('click', () => {
            activityStartTime = Date.now();
            activityTimer = setInterval(updateActivityTimer, 1000);
            
            if (isConnected) {
                socket.emit('activity_control', {
                    action: 'start',
                    activityName: 'Geometry Activity',
                    timestamp: activityStartTime
                });
            }
        });

        document.getElementById('stopActivityBtn').addEventListener('click', () => {
            if (activityTimer) {
                clearInterval(activityTimer);
                activityTimer = null;
            }
            
            if (isConnected) {
                socket.emit('activity_control', {
                    action: 'stop',
                    timestamp: Date.now()
                });
            }
        });

        function updateActivityTimer() {
            if (!activityStartTime) return;
            
            const elapsed = Math.floor((Date.now() - activityStartTime) / 1000);
            const minutes = Math.floor(elapsed / 60);
            const seconds = elapsed % 60;
            
            document.getElementById('activityTimer').textContent = 
                `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
        }

        // === Stats ===
        function updateConnectionStatus(connected) {
            const status = document.getElementById('connectionStatus');
            status.textContent = connected ? '✅ Online' : '❌ Offline';
        }

        function updateStatsFromUsers(users) {
            const total = users.length;
            const camera = users.filter((u) => u.role === 'camera').length;
            const mouse = users.filter((u) => u.role === 'mouse').length;

            document.getElementById('connectedCount').textContent = total;
            document.getElementById('cameraCount').textContent = camera;
            document.getElementById('mouseCount').textContent = mouse;
        }

        function updateStudentList(users) {
            const container = document.getElementById('studentList');
            container.innerHTML = '';

            if (!users.length) {
                const empty = document.createElement('span');
                empty.style.opacity = '0.7';
                empty.textContent = 'Κανένας';
                container.appendChild(empty);
                return;
            }

            users.forEach((user) => {
                const item = document.createElement('span');
                item.style.display = 'inline-flex';
                item.style.alignItems = 'center';
                item.style.gap = '6px';
                item.style.padding = '4px 8px';
                item.style.borderRadius = '8px';
                item.style.background = 'rgba(255,255,255,0.15)';
                item.style.fontSize = '0.85rem';

                const dot = document.createElement('span');
                dot.style.width = '10px';
                dot.style.height = '10px';
                dot.style.background = user.color || '#FF6B6B';
                dot.style.borderRadius = user.shape === 'square' ? '2px' : '50%';
                dot.style.display = 'inline-block';

                item.appendChild(dot);
                item.appendChild(document.createTextNode(user.name || 'Χρήστης'));
                container.appendChild(item);
            });
        }

        function updateFromUsers(users) {
            studentPoints.clear();

            users.forEach((user) => {
                if (typeof user.x !== 'number' || typeof user.y !== 'number') return;
                studentPoints.set(user.id, {
                    x: user.x,
                    y: user.y,
                    color: user.color,
                    shape: user.shape,
                    name: user.name,
                    role: user.role
                });
            });

            updateStatsFromUsers(users);
            updateStudentList(users);
            render();
        }

        // === Initialize ===
        window.addEventListener('load', () => {
            connectToServer();
            render();
            
        });

        // Make deleteGeometry available globally
        window.deleteGeometry = deleteGeometry;
    </script>
</body>
</html>
