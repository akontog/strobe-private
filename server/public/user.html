<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Strobe User - Κίνηση Σημείου</title>
  <link rel="stylesheet" type="text/css" href="css/styles.css">
  <script src="/socket.io/socket.io.js"></script>
  <style>
    .user-container {
      display: flex;
      flex-direction: column;
      height: 100vh;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: white;
    }

    .user-header {
      background: rgba(255,255,255,0.15);
      padding: 20px;
      text-align: center;
      backdrop-filter: blur(10px);
    }

    .user-header h1 {
      margin: 0;
      font-size: 2rem;
    }

    .role-selector {
      margin: 20px 0;
      display: flex;
      gap: 15px;
      justify-content: center;
      align-items: center;
    }

    .user-settings {
      display: flex;
      gap: 15px;
      justify-content: center;
      align-items: center;
      flex-wrap: wrap;
      margin-top: 10px;
    }

    .user-field {
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(255,255,255,0.15);
      padding: 8px 12px;
      border-radius: 10px;
    }

    .user-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .user-field label {
      font-weight: 600;
      font-size: 0.95rem;
      white-space: nowrap;
    }

    .user-input,
    .user-select {
      border: none;
      border-radius: 8px;
      padding: 6px 10px;
      font-size: 0.95rem;
      background: rgba(255,255,255,0.9);
    }

    .user-color {
      width: 40px;
      height: 30px;
      border: 2px solid rgba(255,255,255,0.6);
      border-radius: 6px;
      cursor: pointer;
      padding: 0;
    }

    .role-btn {
      padding: 15px 30px;
      border: none;
      border-radius: 10px;
      font-size: 1.2rem;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.3s;
      background: rgba(255,255,255,0.2);
      color: white;
    }

    .role-btn.active {
      background: #4ECDC4;
      transform: scale(1.1);
    }

    .role-btn:hover {
      transform: scale(1.05);
    }

    .connect-btn {
      border: none;
      border-radius: 8px;
      padding: 8px 12px;
      font-weight: 700;
      cursor: pointer;
      color: #0f172a;
      background: #4ECDC4;
      transition: transform 0.2s ease;
    }

    .connect-btn.disconnect {
      background: #fca5a5;
      color: #7f1d1d;
    }

    .connect-btn:hover {
      transform: translateY(-1px);
    }

    .connect-btn:disabled {
      opacity: 0.55;
      cursor: not-allowed;
      transform: none;
    }

    .user-canvas-container {
      flex: 1;
      position: relative;
      overflow: hidden;
      margin: 20px;
      border-radius: 15px;
      background: white;
      box-shadow: 0 10px 40px rgba(0,0,0,0.3);
    }

    #userCanvas {
      display: block;
      width: 100%;
      height: 100%;
      cursor: crosshair;
    }

    .user-marker {
      position: absolute;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      border: 3px solid white;
      box-shadow: 0 0 10px rgba(0,0,0,0.5);
      transform: translate(-50%, -50%);
      pointer-events: none;
      transition: all 0.1s ease-out;
    }

    .user-marker.me {
      width: 25px;
      height: 25px;
      border-width: 4px;
      animation: pulse 1s infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: translate(-50%, -50%) scale(1); }
      50% { transform: translate(-50%, -50%) scale(1.2); }
    }

    .user-info {
      padding: 15px;
      background: rgba(255,255,255,0.1);
      text-align: center;
      font-size: 1.1rem;
    }

    .status-indicator {
      display: inline-block;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      margin-right: 8px;
      animation: blink 1s infinite;
    }

    .status-indicator.connected {
      background: #4ECDC4;
    }

    .status-indicator.disconnected {
      background: #ef4444;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .camera-overlay {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0.2;
      display: none;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div class="user-container">
    <div class="user-header">
      <h1>🎯 Strobe User Client</h1>
      <p>Κουνήστε το σημείο σας πάνω στη δραστηριότητα!</p>
      
      <div class="role-selector">
        <button class="role-btn active" id="mouseRoleBtn">🖱️ Ποντίκι/Αφή</button>
        <button class="role-btn" id="cameraRoleBtn">📹 Κάμερα</button>
      </div>

      <div class="user-settings">
        <div class="user-field">
          <label for="userName">Όνομα:</label>
          <input id="userName" class="user-input" type="text" placeholder="π.χ. Μαρία">
        </div>
        <div class="user-field">
          <label for="userColor">Χρώμα:</label>
          <input id="userColor" class="user-color" type="color" value="#4ECDC4">
        </div>
        <div class="user-field">
          <label for="userShape">Σχήμα:</label>
          <select id="userShape" class="user-select">
            <option value="circle">● Κύκλος</option>
            <option value="square">■ Τετράγωνο</option>
            <option value="triangle">▲ Τρίγωνο</option>
            <option value="diamond">◆ Ρόμβος</option>
          </select>
        </div>
        <div class="user-field user-actions">
          <button id="connectBtn" class="connect-btn" type="button">Connect</button>
          <button id="disconnectBtn" class="connect-btn disconnect" type="button" disabled>Disconnect</button>
        </div>
      </div>
    </div>

    <div class="user-canvas-container">
      <video id="cameraOverlay" class="camera-overlay" autoplay playsinline muted></video>
      <canvas id="userCanvas"></canvas>
    </div>

    <div class="user-info">
      <span class="status-indicator disconnected" id="statusIndicator"></span>
      <span id="statusText">Disconnected. Δώσε όνομα και πάτα Connect.</span>
      <span style="margin-left: 20px;">👥 Ενεργοί χρήστες: <strong id="userCount">0</strong></span>
    </div>
  </div>

  <script>
    // === Configuration ===
    const canvas = document.getElementById('userCanvas');
    const ctx = canvas.getContext('2d');
    const socket = io({ autoConnect: false });
    const urlParams = new URLSearchParams(window.location.search);
    const connectBtn = document.getElementById('connectBtn');
    const disconnectBtn = document.getElementById('disconnectBtn');

    const CONNECT_NAME_KEY = 'strobeStudentConnectName';
    const QUERY_NAME = (urlParams.get('name') || '').trim();
    const AUTO_CONNECT_QUERY = (urlParams.get('autoconnect') || '').toLowerCase();
    const SHOULD_AUTOCONNECT = ['1', 'true', 'yes'].includes(AUTO_CONNECT_QUERY);

    let currentRole = 'mouse'; // 'mouse' or 'camera'
    let myPosition = { x: 0.5, y: 0.5 }; // Normalized 0-1
    let allUsers = [];
    let currentActivity = null;
    let isConnected = false;
    let myUserId = null;
    let userName = '';
    let userColor = '#4ECDC4';
    let userShape = 'circle';

    const LEGACY_ACTIVITY_WIDTH = 1200;
    const LEGACY_ACTIVITY_HEIGHT = 700;

    // Resize canvas
    function resizeCanvas() {
      const container = canvas.parentElement;
      canvas.width = container.clientWidth;
      canvas.height = container.clientHeight;
      render();
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    // === Socket Connection ===
    socket.on('connect', () => {
      isConnected = true;
      myUserId = socket.id;
      updateStatus('✅ Συνδεθήκατε!', true);
      updateConnectionButtons();
      console.log('Connected:', myUserId);
      emitUserUpdate();
    });

    socket.on('disconnect', () => {
      isConnected = false;
      myUserId = null;
      allUsers = [];
      document.getElementById('userCount').textContent = '0';
      updateStatus('⚪ Disconnected. Πάτα Connect για σύνδεση.', false);
      updateConnectionButtons();
      render();
    });

    socket.on('activity-loaded', (activity) => {
      currentActivity = activity;
      console.log('Activity loaded:', activity);
      render();
    });

    socket.on('users-update', (users) => {
      allUsers = users;
      document.getElementById('userCount').textContent = users.length;
      render();
    });

    socket.on('camera-points', (data) => {
      if (currentRole !== 'camera') return;
      if (!data || !Array.isArray(data.points) || data.points.length === 0) return;

      const first = data.points[0];
      if (typeof first.x === 'number' && typeof first.y === 'number') {
        myPosition = {
          x: Math.max(0, Math.min(1, first.x)),
          y: Math.max(0, Math.min(1, first.y))
        };
        render();
      }
    });

    // === Role Selection ===
    document.getElementById('mouseRoleBtn').addEventListener('click', () => {
      setRole('mouse');
    });

    document.getElementById('cameraRoleBtn').addEventListener('click', () => {
      setRole('camera');
    });

    function setRole(role) {
      currentRole = role;
      
      // Update UI
      document.querySelectorAll('.role-btn').forEach(btn => btn.classList.remove('active'));
      if (role === 'mouse') {
        document.getElementById('mouseRoleBtn').classList.add('active');
        stopCamera();
      } else {
        document.getElementById('cameraRoleBtn').classList.add('active');
        startCamera();
      }

      emitUserUpdate();
    }

    function updateConnectionButtons() {
      connectBtn.disabled = isConnected;
      disconnectBtn.disabled = !isConnected;
    }

    function connectSocket() {
      userName = document.getElementById('userName').value.trim();
      if (!userName) {
        updateStatus('⚠️ Συμπλήρωσε όνομα και μετά πάτα Connect.', false);
        document.getElementById('userName').focus();
        return;
      }

      persistUserSettings();

      if (socket.connected) {
        emitUserUpdate();
        return;
      }

      updateStatus('⏳ Σύνδεση...', false);
      socket.connect();
    }

    function disconnectSocket() {
      if (socket.connected || socket.active) {
        socket.disconnect();
      }
    }

    connectBtn.addEventListener('click', connectSocket);
    disconnectBtn.addEventListener('click', disconnectSocket);

    // === User Settings ===
    function loadUserSettings() {
      const launcherName = localStorage.getItem(CONNECT_NAME_KEY);
      const storedName = localStorage.getItem('strobeUserName');
      const storedColor = localStorage.getItem('strobeUserColor');
      const storedShape = localStorage.getItem('strobeUserShape');

      if (QUERY_NAME) {
        userName = QUERY_NAME;
      } else if (launcherName && launcherName.trim()) {
        userName = launcherName.trim();
      } else if (storedName && storedName.trim()) {
        userName = storedName.trim();
      } else {
        userName = '';
      }

      userColor = storedColor || '#4ECDC4';
      userShape = storedShape || 'circle';

      document.getElementById('userName').value = userName;
      document.getElementById('userColor').value = userColor;
      document.getElementById('userShape').value = userShape;

      persistUserSettings();
    }

    function persistUserSettings() {
      localStorage.setItem('strobeUserName', userName);
      localStorage.setItem(CONNECT_NAME_KEY, userName);
      localStorage.setItem('strobeUserColor', userColor);
      localStorage.setItem('strobeUserShape', userShape);
    }

    document.getElementById('userName').addEventListener('input', (e) => {
      userName = e.target.value.trim();
      persistUserSettings();
      emitUserUpdate();
    });

    document.getElementById('userName').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        connectSocket();
      }
    });

    document.getElementById('userColor').addEventListener('change', (e) => {
      userColor = e.target.value;
      persistUserSettings();
      emitUserUpdate();
      render();
    });

    document.getElementById('userShape').addEventListener('change', (e) => {
      userShape = e.target.value;
      persistUserSettings();
      emitUserUpdate();
      render();
    });

    // === Mouse/Touch Tracking ===
    canvas.addEventListener('mousemove', (e) => {
      if (currentRole !== 'mouse') return;
      updateMyPosition(e);
    });

    canvas.addEventListener('touchmove', (e) => {
      if (currentRole !== 'mouse') return;
      e.preventDefault();
      const touch = e.touches[0];
      updateMyPosition(touch);
    });

    function updateMyPosition(event) {
      const rect = canvas.getBoundingClientRect();
      const x = (event.clientX - rect.left) / rect.width;
      const y = (event.clientY - rect.top) / rect.height;
      
      myPosition = { x: Math.max(0, Math.min(1, x)), y: Math.max(0, Math.min(1, y)) };
      
      // Send to server
      emitUserUpdate();
      
      render();
    }

    // === Camera Tracking ===
    let cameraStream = null;
    let cameraInterval = null;
    let captureCanvas = null;
    let captureCtx = null;

    async function startCamera() {
      try {
        cameraStream = await navigator.mediaDevices.getUserMedia({ 
          video: { facingMode: 'user' } 
        });
        
        const video = document.getElementById('cameraOverlay');
        video.srcObject = cameraStream;
        video.style.display = 'block';

        if (!captureCanvas) {
          captureCanvas = document.createElement('canvas');
          captureCanvas.width = 320;
          captureCanvas.height = 240;
          captureCtx = captureCanvas.getContext('2d');
        }

        cameraInterval = setInterval(() => {
          if (!captureCtx || !isConnected) return;

          captureCtx.drawImage(video, 0, 0, captureCanvas.width, captureCanvas.height);
          const dataUrl = captureCanvas.toDataURL('image/jpeg', 0.55);
          const base64 = dataUrl.split(',')[1];

          socket.emit('camera-frame', {
            image: base64,
            name: userName || 'Χρήστης',
            color: userColor,
            shape: userShape
          });
        }, 150);
      } catch (error) {
        alert('❌ Δεν ήταν δυνατή η πρόσβαση στην κάμερα');
        setRole('mouse');
        console.error(error);
      }
    }

    function stopCamera() {
      if (cameraStream) {
        cameraStream.getTracks().forEach(track => track.stop());
        cameraStream = null;
      }
      if (cameraInterval) {
        clearInterval(cameraInterval);
        cameraInterval = null;
      }
      const video = document.getElementById('cameraOverlay');
      video.srcObject = null;
      video.style.display = 'none';
    }

    // === Rendering ===
    function render() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      
      // Draw activity geometry (static shapes from teacher)
      if (currentActivity && currentActivity.geometry) {
        drawActivity(currentActivity.geometry);
      }
      
      // Draw all user positions
      allUsers.forEach(user => {
        drawUserMarker(user, user.id === myUserId);
      });
    }

    function isNormalizedCoordinate(value) {
      return Number.isFinite(value) && value >= 0 && value <= 1;
    }

    function projectX(value) {
      if (!Number.isFinite(value)) return 0;
      return isNormalizedCoordinate(value)
        ? value * canvas.width
        : (value / LEGACY_ACTIVITY_WIDTH) * canvas.width;
    }

    function projectY(value) {
      if (!Number.isFinite(value)) return 0;
      return isNormalizedCoordinate(value)
        ? value * canvas.height
        : (value / LEGACY_ACTIVITY_HEIGHT) * canvas.height;
    }

    function projectDeltaX(value) {
      if (!Number.isFinite(value)) return 0;
      return isNormalizedCoordinate(value)
        ? value * canvas.width
        : (value / LEGACY_ACTIVITY_WIDTH) * canvas.width;
    }

    function projectDeltaY(value) {
      if (!Number.isFinite(value)) return 0;
      return isNormalizedCoordinate(value)
        ? value * canvas.height
        : (value / LEGACY_ACTIVITY_HEIGHT) * canvas.height;
    }

    function projectRadius(value) {
      if (!Number.isFinite(value)) return 0;

      if (isNormalizedCoordinate(value)) {
        return value * Math.min(canvas.width, canvas.height);
      }

      const sx = canvas.width / LEGACY_ACTIVITY_WIDTH;
      const sy = canvas.height / LEGACY_ACTIVITY_HEIGHT;
      return value * Math.min(sx, sy);
    }

    function drawActivity(geometry) {
      if (!Array.isArray(geometry)) {
        return;
      }

      geometry.forEach(obj => {
        if (!obj || typeof obj !== 'object') {
          return;
        }

        ctx.strokeStyle = obj.color || '#000000';
        ctx.fillStyle = obj.color || '#000000';
        ctx.lineWidth = obj.width || obj.lineWidth || 2;

        switch (obj.type) {
          case 'point':
            ctx.beginPath();
            ctx.arc(projectX(obj.x), projectY(obj.y), 5, 0, Math.PI * 2);
            ctx.fill();
            break;

          case 'line':
            ctx.beginPath();
            ctx.moveTo(projectX(obj.x1), projectY(obj.y1));
            ctx.lineTo(projectX(obj.x2), projectY(obj.y2));
            ctx.stroke();
            break;

          case 'ray': {
            const startX = projectX(obj.x1);
            const startY = projectY(obj.y1);
            const secondX = projectX(obj.x2);
            const secondY = projectY(obj.y2);
            const dx = secondX - startX;
            const dy = secondY - startY;
            const len = Math.hypot(dx, dy);

            if (!Number.isFinite(len) || len < 0.001) {
              break;
            }

            const extension = Math.max(canvas.width, canvas.height) * 2;

            ctx.beginPath();
            ctx.moveTo(startX, startY);
            ctx.lineTo(startX + (dx / len) * extension, startY + (dy / len) * extension);
            ctx.stroke();
            break;
          }

          case 'circle':
            {
              const cxRaw = Number.isFinite(obj.cx) ? obj.cx : obj.x;
              const cyRaw = Number.isFinite(obj.cy) ? obj.cy : obj.y;
              const radius = projectRadius(obj.radius);

              if (!Number.isFinite(cxRaw) || !Number.isFinite(cyRaw) || radius <= 0) {
                break;
              }

              ctx.beginPath();
              ctx.arc(projectX(cxRaw), projectY(cyRaw), radius, 0, Math.PI * 2);
              ctx.stroke();
              break;
            }

          case 'triangle':
            if (Array.isArray(obj.points) && obj.points.length >= 3) {
              ctx.beginPath();
              ctx.moveTo(projectX(obj.points[0].x), projectY(obj.points[0].y));
              ctx.lineTo(projectX(obj.points[1].x), projectY(obj.points[1].y));
              ctx.lineTo(projectX(obj.points[2].x), projectY(obj.points[2].y));
              ctx.closePath();
              ctx.stroke();
            }
            break;

          case 'rectangle':
            if (Number.isFinite(obj.x) && Number.isFinite(obj.y) && Number.isFinite(obj.width) && Number.isFinite(obj.height)) {
              ctx.beginPath();
              ctx.rect(projectX(obj.x), projectY(obj.y), projectDeltaX(obj.width), projectDeltaY(obj.height));
              ctx.stroke();
              break;
            }

            if (Number.isFinite(obj.x1) && Number.isFinite(obj.y1) && Number.isFinite(obj.x2) && Number.isFinite(obj.y2)) {
              const x1 = projectX(obj.x1);
              const y1 = projectY(obj.y1);
              const x2 = projectX(obj.x2);
              const y2 = projectY(obj.y2);

              ctx.beginPath();
              ctx.rect(x1, y1, x2 - x1, y2 - y1);
              ctx.stroke();
            }
            break;

          case 'polygon':
            if (obj.points && obj.points.length > 0) {
              ctx.beginPath();
              ctx.moveTo(projectX(obj.points[0].x), projectY(obj.points[0].y));
              for (let i = 1; i < obj.points.length; i++) {
                ctx.lineTo(projectX(obj.points[i].x), projectY(obj.points[i].y));
              }
              ctx.closePath();
              ctx.stroke();
            }
            break;
        }
      });
    }

    function drawUserMarker(user, isMe) {
      const x = user.x * canvas.width;
      const y = user.y * canvas.height;
      const color = user.color || '#4ECDC4';
      const shape = user.shape || 'circle';
      const label = user.name || (isMe ? 'ΕΓΩ' : 'Χρήστης');
      const size = isMe ? 12 : 10;

      // Outer glow
      ctx.shadowBlur = 15;
      ctx.shadowColor = color;

      // Self highlight ring
      if (isMe) {
        ctx.shadowBlur = 0;
        ctx.strokeStyle = 'white';
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.arc(x, y, size + 6, 0, Math.PI * 2);
        ctx.stroke();
      }

      // Marker shape
      ctx.fillStyle = color;
      drawMarkerShape(x, y, size, shape);

      // Inner white dot
      ctx.shadowBlur = 0;
      ctx.fillStyle = 'white';
      ctx.beginPath();
      ctx.arc(x, y, isMe ? 5 : 4, 0, Math.PI * 2);
      ctx.fill();

      // Label
      ctx.fillStyle = isMe ? 'white' : color;
      ctx.font = isMe ? 'bold 14px sans-serif' : 'bold 12px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(label, x, y - (isMe ? 24 : 18));
    }

    function drawMarkerShape(x, y, size, shape) {
      ctx.beginPath();

      if (shape === 'square') {
        ctx.rect(x - size, y - size, size * 2, size * 2);
      } else if (shape === 'triangle') {
        ctx.moveTo(x, y - size - 2);
        ctx.lineTo(x - size - 2, y + size + 2);
        ctx.lineTo(x + size + 2, y + size + 2);
        ctx.closePath();
      } else if (shape === 'diamond') {
        ctx.moveTo(x, y - size - 2);
        ctx.lineTo(x - size - 2, y);
        ctx.lineTo(x, y + size + 2);
        ctx.lineTo(x + size + 2, y);
        ctx.closePath();
      } else {
        ctx.arc(x, y, size, 0, Math.PI * 2);
      }

      ctx.fill();
    }

    function emitUserUpdate() {
      if (!isConnected) return;

      socket.emit('user-position', {
        x: myPosition.x,
        y: myPosition.y,
        role: currentRole,
        name: userName || 'Χρήστης',
        color: userColor,
        shape: userShape
      });
    }

    function updateStatus(text, connected) {
      document.getElementById('statusText').textContent = text;
      const indicator = document.getElementById('statusIndicator');
      indicator.className = `status-indicator ${connected ? 'connected' : 'disconnected'}`;
    }

    // Initial load
    loadUserSettings();
    updateConnectionButtons();

    if (SHOULD_AUTOCONNECT && userName) {
      connectSocket();
    } else {
      updateStatus('⚪ Disconnected. Δώσε όνομα και πάτα Connect.', false);
    }

    fetch('/api/activity/current')
      .then(r => r.json())
      .then(activity => {
        if (activity.geometry) {
          currentActivity = activity;
          render();
        }
      });
  </script>
</body>
</html>
